id: code-review
name: Code Review
description: Single-phase review template. Submit code; up to 4 cross-lineage reviewers critique. Best for quick peer feedback.
author: chorus
agreementThreshold: 0.66
onThresholdMet: ask
maxRounds: 3
yoloDefault: false

# Ship phase: when chat is created with `repoPath`, after reviewers agree
# chorus branches off main, commits the doer's diff, pushes, and opens a PR
# via `gh pr create`. No auto-merge — human clicks Merge in GitHub.
# Skip behavior: when chat has no repoPath, ship is auto-skipped and chat
# ends `approved`.
ship:
  enabled: true
  branchPattern: "chorus/{chatId}"
  titleTemplate: "chorus: code-review via #{chatId}"

phases:
  - id: review
    kind: review
    title: Code Review
    description: You submit your implementation; reviewers from different LLM lineages critique it independently. Quorum is 3 of 4.
    doer:
      lineage: any
      models: []
    reviewer:
      require: 3
      crossLineage: true
      candidates:
        - lineage: anthropic
        - lineage: openai
        - lineage: google
        - lineage: moonshot
    inputs:
      include: []
      exclude: []
    iterate:
      maxRounds: 2
      onDisagreement: continue
