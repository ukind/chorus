id: tri-review
name: Tri-Review
description: Single-round, three-reviewer template. Claude Opus 4.7 produces; Codex (gpt-5.5), Gemini 3.1 Pro Preview, and Kimi K2.6 review independently. Quorum is 2 of 3.
author: chorus
agreementThreshold: 0.66
onThresholdMet: ask
maxRounds: 1
yoloDefault: false

phases:
  - id: review
    kind: review
    title: Tri-Review
    description: Claude Opus 4.7 produces; Codex, Gemini, and Kimi review independently. 2-of-3 quorum.
    doer:
      lineage: anthropic
      models:
        - claude-opus-4-7
    reviewer:
      require: 2
      crossLineage: true
      candidates:
        - lineage: openai
          models:
            - gpt-5.5
        - lineage: google
          models:
            - gemini-3.1-pro-preview
        - lineage: moonshot
          models:
            - kimi-k2.6
    inputs:
      include: []
      exclude: []
    iterate:
      maxRounds: 1
      onDisagreement: continue
      shareSessionAcrossRounds: false
      shareSessionAcrossPhases: false
