id: bug-diagnose
name: Bug Diagnosis
description: Adversarial diagnosis. Anthropic produces a hypothesis; OpenAI challenges it. Good for complex bugs where multiple perspectives uncover the root cause.
author: chorus
agreementThreshold: 0.5
onThresholdMet: ask
maxRounds: 2
yoloDefault: false

phases:
  - id: diagnose
    kind: plan
    title: Diagnose Bug
    description: Anthropic (Opus) produces a hypothesis about what's broken and why. OpenAI (GPT-5) independently challenges it.
    doer:
      lineage: anthropic
      models:
        - claude-opus-4-7
    reviewer:
      require: 1
      crossLineage: true
      candidates:
        - lineage: openai
          models:
            - gpt-5
    inputs:
      include: []
      exclude: []
    iterate:
      maxRounds: 2
      onDisagreement: continue
